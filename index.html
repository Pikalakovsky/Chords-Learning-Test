<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Chords Training</title>
<style>
    :root {
        --royal-blue: #1e3799;
        --accent: #f8c291;
        --success: #78e08f;
        --error: #eb2f06;
    }

    body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: var(--royal-blue);
        font-family: 'Segoe UI', Roboto, sans-serif;
        color: white;
        overflow: hidden;
    }

    /* Structure originale */
    .app-card {
        background: rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(12px);
        padding: 40px 50px;
        border-radius: 30px;
        box-shadow: 0 20px 50px rgba(0,0,0,0.3);
        width: 750px;
        min-height: 520px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: flex-start;
        gap: 25px;
        border: 1px solid rgba(255,255,255,0.15);
        box-sizing: border-box;
    }

    /* Adaptation mobile */
    @media (max-width: 768px) {
        .app-card {
            width: 95%;
            padding: 30px 20px;
            min-height: auto;
            gap: 15px;
        }
        #target-chord { font-size: 3.5em !important; }
        .action-zone { top: 20px !important; padding-top: 20px !important; }
        .result-area { margin-top: 0 !important; gap: 20px !important; }
        .verdict-block { padding: 15px 20px !important; width: 90% !important; }
        .btn-group-mobile { flex-direction: column; width: 100%; gap: 10px !important; }
        .main-btn, .retry-btn { width: 100%; padding: 15px 30px !important; }
    }

    .target-container {
        display: flex;
        justify-content: center;
        align-items: flex-end;
        gap: 15px;
        width: 100%;
        min-height: 100px;
    }

    #target-chord {
        font-size: 4.5em;
        font-weight: 900;
        margin: 0;
        margin-left: -3px;
        text-shadow: 2px 4px 10px rgba(0,0,0,0.2);
        line-height: 0.9;
        transform: translateX(-2px);
    }

    #target-chord span, #detected-name span {
        font-style: italic;
        font-weight: 300;
        opacity: 0.9;
        font-size: 0.8em;
        margin-left: 2px;
    }

    .button-regen {
        position: relative;
        width: 1.8em; height: 1.8em;
        transform: rotateX(30deg);
        border-radius: 0.2em;
        border: 1px solid #ffffff;
        box-shadow: 0 0.2em 0 0.05em #ffffff;
        transition: all 150ms, opacity 0.3s ease;
        background: transparent;
        cursor: pointer;
        margin-bottom: 5px;
        flex-shrink: 0;
    }

    .button-regen::after {
        position: absolute; content: "f5"; inset: 0;
        display: flex; justify-content: flex-end; align-items: flex-start;
        padding-top: 2px; padding-right: 3px;
        color: #ffffff; font-weight: bold; font-size: 0.7em;
    }

    .button-regen:active {
        transform: rotateX(30deg) translateY(0.2em);
        box-shadow: 0 0 0 0 #ffffff;
    }

    .action-zone {
        width: 100%; display: flex; flex-direction: column;
        justify-content: center; align-items: center; gap: 15px;
        padding-top: 40px; position: relative; top: 80px; z-index: 10;
        left: 0; right: 0; margin-left: auto; margin-right: auto;
    }

    .main-btn, .retry-btn {
        background: transparent; color: white; border: 2.5px solid white;
        padding: 18px 50px; border-radius: 50px; font-size: 1.2em;
        font-weight: bold; cursor: pointer; transition: 0.3s;
    }

    .main-btn:hover, .retry-btn:hover { background: rgba(255, 255, 255, 0.1); transform: scale(1.05); }

    .loading-wave {
        width: 100%; height: 70px; display: flex;
        justify-content: center; align-items: flex-end; gap: 8px;
        opacity: 0.2; transition: opacity 0.3s ease;
    }
    .loading-wave.active { opacity: 1; }
    .loading-bar { width: 22px; height: 10px; background-color: white; border-radius: 5px; transition: height 0.05s ease-out; }

    .loader-flow { display: flex; justify-content: center; align-items: center; height: 60px; position: relative; }
    .flow-item { position: absolute; height: 4px; width: 80px; background: white; border-radius: 10px; animation: flow_anim 2s infinite; opacity: 0; }
    .f1 { animation-delay: 0.1s; position: relative; }
    .f2 { animation-delay: 0.3s; }
    .f3 { animation-delay: 0.5s; }
    @keyframes flow_anim { 0%, 100% { transform: translateY(15px); opacity: 0.2; } 50% { transform: translateY(-15px); opacity: 1; } }

    .result-area { width: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 40px; margin-top: -80px }
    .spacer-ghost { width: calc(1.8em + 2px); flex-shrink: 0; visibility: hidden; }
    .verdict-block { padding: 20px 40px; border-radius: 15px; background: rgba(255, 255, 255, 0.1); width: 100%; max-width: 450px; text-align: center; }
    .verdict { font-size: 2.8em; font-weight: 900; margin: 10px 0; }

    /* Grille de notes demandée */
    .note-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 15px; }
    .note-square {
        background: rgba(255, 255, 255, 0.2);
        border: 1px solid rgba(255, 255, 255, 0.4);
        border-radius: 8px;
        padding: 5px 10px;
        font-weight: bold;
        font-size: 0.9em;
        min-width: 40px;
    }

    .hidden { display: none !important; }
    .invisible { opacity: 0 !important; pointer-events: none !important; cursor: default !important; }
</style>
</head>
<body>

<div class="app-card">
    <div class="target-container">
        <span class="spacer-ghost"></span> <h1 id="target-chord">-</h1>
        <button class="button-regen" id="btn-refresh" title="Régénérer"></button>
    </div>

    <div class="action-zone">
        <button id="btn-listen" class="main-btn">Play</button>

        <div id="container-waiting" class="hidden">
            <div class="loading-wave" id="wave-ui">
                <div class="loading-bar" id="b1"></div>
                <div class="loading-bar" id="b2"></div>
                <div class="loading-bar" id="b3"></div>
                <div class="loading-bar" id="b4"></div>
            </div>
            <p style="margin: 10px 0 0 0; opacity: 0.8; text-align: center;">Listening to your chord...</p>
        </div>

        <div id="container-analyzing" class="hidden">
            <div class="loader-flow">
                <div class="flow-item f1"></div>
                <div class="flow-item f2"></div>
                <div class="flow-item f3"></div>
            </div>
            <p style="margin: 10px 0 0 0; text-align: center;">Loading...</p>
        </div>

        <div id="result-zone" class="result-area hidden">
            <div class="verdict-block" id="verdict-block">
                <div style="font-size: 1.2em;">I heard : <b id="detected-name">-</b> (<span id="confidence-score">0</span>%)</div>
                <div id="note-grid" class="note-grid hidden"></div>
                <div id="verdict-text" class="verdict"></div>
            </div>
            <div style="display: flex; gap: 20px;" class="btn-group-mobile">
                <button class="retry-btn" id="btn-retry">New chord</button>
                <button class="retry-btn" id="btn-re-attempt">Retry chord</button>
            </div>
        </div>
    </div>
</div>


<script>
const NOTES = ["C", "C&#9839;", "D", "E&flat;", "E", "F", "F&#9839;", "G", "G&#9839;", "A", "B&flat;", "B"];
const CHORD_STRUCTURES = {
    "": [0, 4, 7],
    "m": [0, 3, 7],
    "7": [0, 4, 7, 10],
    "maj7": [0, 4, 7, 11],
    "m7": [0, 3, 7, 10],
    "6": [0, 4, 7, 9],
    "add9": [0, 4, 7, 2],
    "maj9": [0, 4, 7, 11, 2],
    "m9": [0, 3, 7, 10, 2],
    "sus4": [0, 5, 7],
    "dim": [0, 3, 6],
    "aug": [0, 4, 8]
};

let targetChordName = "";
let audioContext, analyser, stream, animationId;
let midiAccumulator = {};
const TRIGGER_DB = -45;

function getRandomChord() {
    let newChord;
    let newRawName;
    do {
        const note = NOTES[Math.floor(Math.random() * NOTES.length)];
        const types = Object.keys(CHORD_STRUCTURES);
        const type = types[Math.floor(Math.random() * types.length)];
        newChord = note + type;
        newRawName = newChord.replace(/&#9839;/g, "#").replace(/&flat;/g, "b");
    } while (newRawName === targetChordName);
    targetChordName = newRawName;
    document.getElementById('target-chord').innerHTML = formatChordDisplay(newChord);
}

function resetUI(withNewChord = false) {
    if (withNewChord) getRandomChord();
    document.getElementById('result-zone').classList.add('hidden');
    document.getElementById('btn-listen').classList.remove('hidden');
    document.getElementById('container-waiting').classList.add('hidden');
    document.getElementById('container-analyzing').classList.add('hidden');
    document.getElementById('wave-ui').classList.remove('active');
    document.getElementById('btn-refresh').classList.remove('invisible');
    document.getElementById('note-grid').classList.add('hidden');
    if(animationId) cancelAnimationFrame(animationId);
    if(stream) stream.getTracks().forEach(t => t.stop());
}

async function startAnalysis() {
    document.getElementById('btn-refresh').classList.add('invisible');
    document.getElementById('btn-listen').classList.add('hidden');
    document.getElementById('container-waiting').classList.remove('hidden');
    midiAccumulator = {};

    try {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
        const source = audioContext.createMediaStreamSource(stream);
        analyser = audioContext.createAnalyser();
        analyser.fftSize = 4096;
        source.connect(analyser);
        updateWave();

        let triggered = false;
        let startT = 0;

        const check = setInterval(() => {
            const data = new Float32Array(analyser.frequencyBinCount);
            analyser.getFloatFrequencyData(data);
            const currentVol = Math.max(...data);

            if (!triggered && currentVol > TRIGGER_DB) {
                triggered = true;
                startT = Date.now();
                document.getElementById('wave-ui').classList.add('active');
            }

            if (triggered) {
                for (let i = 1; i < data.length - 1; i++) {
                    if (data[i] > -60 && data[i] > data[i-1] && data[i] > data[i+1]) {
                        const freq = i * audioContext.sampleRate / analyser.fftSize;
                        if (freq > 60 && freq < 1100) {
                            const midi = Math.round(12 * Math.log2(freq/440) + 69);
                            midiAccumulator[midi] = (midiAccumulator[midi] || 0) + (data[i] + 100);
                        }
                    }
                }
                if (Date.now() - startT > 2000) {
                    clearInterval(check);
                    document.getElementById('container-waiting').classList.add('hidden');
                    document.getElementById('container-analyzing').classList.remove('hidden');
                    setTimeout(finish, 500);
                }
            }
        }, 100);
    } catch (e) { resetUI(); }
}

function getRootFromChordName(name) {
    const match = name.match(/^[A-G](#|b|&flat;|&#9839;)?/);
    return match ? match[0] : "";
}

function analyzeHarmonics(pcs, targetRoot) {
    if (!pcs || pcs.length === 0) return [];
    let results = [];
    const cleanTargetRoot = targetRoot.replace(/&#9839;/g, "#").replace(/&flat;/g, "b");

    for (let root = 0; root < 12; root++) {
        const rootNameRaw = NOTES[root].replace(/&#9839;/g, "#").replace(/&flat;/g, "b");
        const relativeIntervals = pcs.map(pc => (pc - root + 12) % 12);

        for (let [type, structure] of Object.entries(CHORD_STRUCTURES)) {
            if (structure.every(interval => relativeIntervals.includes(interval))) {

                // RÈGLE ANTI-MAJ7 : Vérifie si des notes étrangères sont présentes
                const unintended = relativeIntervals.filter(i => !structure.includes(i)).length;

                let confidence = structure.length / pcs.length;
                let priorityScore = confidence * 1000;

                // Pénalité pour les notes en trop (évite maj7 fantôme)
                priorityScore -= (unintended * 150);

                if (rootNameRaw === cleanTargetRoot) priorityScore += 500;
                priorityScore += (structure.length * 10);

                results.push({
                    name: NOTES[root] + type,
                    score: priorityScore,
                    displayConf: confidence
                });
            }
        }
    }
    return results.sort((a, b) => b.score - a.score);
}

function finish() {
    if (stream) stream.getTracks().forEach(t => t.stop());
    cancelAnimationFrame(animationId);
    document.getElementById('container-analyzing').classList.add('hidden');
    document.getElementById('result-zone').classList.remove('hidden');

    const midis = Object.keys(midiAccumulator).map(Number);
    if (midis.length === 0) {
        document.getElementById('detected-name').innerHTML = "-";
        document.getElementById('confidence-score').innerText = "0";
        document.getElementById('verdict-text').innerText = "NOTHING HEARD";
        return;
    }

    const maxWeight = Math.max(...Object.values(midiAccumulator));
    const filteredMidis = midis.filter(m => midiAccumulator[m] > maxWeight * 0.35).sort((a,b) => a-b);
    const pcs = [...new Set(filteredMidis.map(m => m % 12))];

    const targetRoot = getRootFromChordName(targetChordName);
    const foundChords = analyzeHarmonics(pcs, targetRoot);

    const verdictTextEl = document.getElementById('verdict-text');
    const verdictBlockEl = document.getElementById('verdict-block');
    const noteGrid = document.getElementById('note-grid');

    // SI RIEN N'EST TROUVÉ : Affiche "idk" + les carrés de notes
    if (foundChords.length === 0 || foundChords[0].score < 200) {
        document.getElementById('detected-name').innerHTML = "idk";
        document.getElementById('confidence-score').innerText = "0";

        noteGrid.classList.remove('hidden');
        noteGrid.innerHTML = filteredMidis.map(m => {
            const n = NOTES[m%12].replace(/&#9839;/g, "#").replace(/&flat;/g, "b");
            const oct = Math.floor(m/12)-1;
            return `<div class="note-square">${n}${oct}</div>`;
        }).join('');

        verdictTextEl.innerText = "Try again";
        verdictBlockEl.style.background = 'rgba(255, 255, 255, 0.1)';
        return;
    }

    const best = foundChords[0];
    const simplify = (s) => s.replace(/&#9839;/g, "#").replace(/&flat;/g, "b").toLowerCase();
    const win = simplify(best.name) === simplify(targetChordName);

    noteGrid.classList.add('hidden');
    document.getElementById('detected-name').innerHTML = formatChordDisplay(best.name);
    document.getElementById('confidence-score').innerText = Math.round(best.displayConf * 100);

    if (win) {
        verdictTextEl.innerText = "That's right !";
        verdictTextEl.style.color = "var(--success)";
        verdictBlockEl.style.background = 'rgba(120, 224, 143, 0.2)';
    } else {
        verdictTextEl.innerText = "Not really...";
        verdictTextEl.style.color = "var(--error)";
        verdictBlockEl.style.background = 'rgba(235, 47, 6, 0.2)';
    }
}

function updateWave() {
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
    document.getElementById('b1').style.height = (10 + (dataArray[15] / 255) * 40) + "px";
    document.getElementById('b2').style.height = (10 + (dataArray[40] / 255) * 80) + "px";
    document.getElementById('b3').style.height = (10 + (dataArray[80] / 255) * 80) + "px";
    document.getElementById('b4').style.height = (10 + (dataArray[120] / 255) * 40) + "px";
    animationId = requestAnimationFrame(updateWave);
}

function formatChordDisplay(name) {
    let note = name.match(/^[A-G](&#9839;|&flat;)?/)[0];
    let type = name.replace(note, "");
    if (type.startsWith('m') && !type.startsWith('maj')) {
        note += 'm';
        type = type.substring(1);
    }
    return type ? `${note}<span>${type}</span>` : note;
}

document.getElementById('btn-listen').onclick = startAnalysis;
document.getElementById('btn-retry').onclick = () => resetUI(true);
document.getElementById('btn-re-attempt').onclick = () => resetUI(false);
document.getElementById('btn-refresh').onclick = getRandomChord;
getRandomChord();
</script>
</body>
</html>
